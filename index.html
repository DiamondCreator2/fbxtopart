<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockbench FBX Viewer & Texturer</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Three.js and Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fflate@0.8.0/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-layer { position: relative; z-index: 10; pointer-events: none; }
        .pointer-events-auto { pointer-events: auto; }
        
        /* Custom scrollbar for sidebar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
    </style>
</head>
<body class="text-gray-100 font-sans antialiased">

    <!-- 3D Canvas -->
    <div id="canvas-container"></div>

    <!-- UI Overlay -->
    <div id="ui-layer" class="flex h-screen w-full">
        <!-- Sidebar -->
        <div class="w-80 bg-gray-900/90 backdrop-blur-md border-r border-gray-700 p-6 flex flex-col gap-6 pointer-events-auto shadow-2xl overflow-y-auto">
            
            <div class="border-b border-gray-700 pb-4">
                <h1 class="text-2xl font-bold text-white flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-400"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.29 7 12 12 20.71 7"></polyline><line x1="12" y1="22" x2="12" y2="12"></line></svg>
                    Model Viewer
                </h1>
                <p class="text-sm text-gray-400 mt-1">Upload Blockbench FBX & Textures</p>
            </div>

            <!-- Step 1: Model Upload -->
            <div class="flex flex-col gap-3">
                <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wider">1. Load Model (FBX)</h2>
                <label for="fbx-upload" class="cursor-pointer group flex flex-col items-center justify-center p-6 border-2 border-dashed border-gray-600 rounded-xl hover:border-indigo-500 hover:bg-gray-800/50 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-gray-400 group-hover:text-indigo-400 mb-2 transition-colors"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    <span class="text-sm font-medium text-gray-300">Choose FBX File</span>
                    <span class="text-xs text-gray-500 mt-1">.fbx format</span>
                </label>
                <input type="file" id="fbx-upload" accept=".fbx" class="hidden" />
            </div>

            <!-- Step 2: Texture Upload -->
            <div class="flex flex-col gap-3">
                <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wider">2. Apply Texture</h2>
                <label for="texture-upload" class="cursor-pointer group flex flex-col items-center justify-center p-6 border-2 border-dashed border-gray-600 rounded-xl hover:border-green-500 hover:bg-gray-800/50 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-gray-400 group-hover:text-green-400 mb-2 transition-colors"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                    <span class="text-sm font-medium text-gray-300">Choose Texture</span>
                    <span class="text-xs text-gray-500 mt-1">PNG or JPG (Pixel Art friendly)</span>
                </label>
                <input type="file" id="texture-upload" accept="image/png, image/jpeg" class="hidden" />
            </div>

            <!-- Controls -->
            <div class="mt-auto flex flex-col gap-3 pt-4 border-t border-gray-700">
                <button id="reset-cam-btn" class="w-full py-2.5 bg-gray-800 hover:bg-gray-700 text-white rounded-lg font-medium transition-colors border border-gray-600">
                    Reset Camera
                </button>
            </div>
            
        </div>
        
        <!-- Top Right Instructions -->
        <div class="absolute top-6 right-6 bg-gray-900/80 backdrop-blur border border-gray-700 p-4 rounded-xl shadow-lg pointer-events-auto max-w-xs">
            <h3 class="font-medium text-white mb-2 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-yellow-400"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                Controls
            </h3>
            <ul class="text-sm text-gray-300 space-y-1">
                <li>• <span class="text-gray-400">Left Click + Drag:</span> Rotate</li>
                <li>• <span class="text-gray-400">Right Click + Drag:</span> Pan</li>
                <li>• <span class="text-gray-400">Scroll:</span> Zoom</li>
            </ul>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-6 right-6 transform translate-y-20 opacity-0 transition-all duration-300 bg-gray-800 border-l-4 border-indigo-500 text-white p-4 rounded shadow-2xl z-50 flex items-center gap-3">
        <svg id="toast-icon-success" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-green-400 hidden"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        <svg id="toast-icon-error" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-red-400 hidden"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        <span id="toast-message" class="font-medium text-sm">Notification message</span>
    </div>

    <script>
        let scene, camera, renderer, controls;
        let currentModel = null;
        let toastTimeout;

        // Custom notification system (replaces alert)
        function showNotification(message, type = 'success') {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toast-message');
            const iconSuccess = document.getElementById('toast-icon-success');
            const iconError = document.getElementById('toast-icon-error');
            
            msgEl.textContent = message;
            
            if (type === 'error') {
                toast.classList.replace('border-indigo-500', 'border-red-500');
                toast.classList.replace('border-green-500', 'border-red-500');
                iconSuccess.classList.add('hidden');
                iconError.classList.remove('hidden');
            } else {
                toast.classList.replace('border-indigo-500', 'border-green-500');
                toast.classList.replace('border-red-500', 'border-green-500');
                iconSuccess.classList.remove('hidden');
                iconError.classList.add('hidden');
            }

            toast.classList.remove('translate-y-20', 'opacity-0');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3500);
        }

        window.onload = function () {
            initThreeJS();
            setupEventListeners();
        };

        function initThreeJS() {
            const container = document.getElementById('canvas-container');

            // Scene setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1e1e24); // Dark background
            
            // Grid helper to ground the model
            const gridHelper = new THREE.GridHelper(50, 50, 0x444444, 0x222222);
            scene.add(gridHelper);

            // Camera setup
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(15, 10, 15);

            // Renderer setup
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            // In Three r128, to render textures accurately
            renderer.outputEncoding = THREE.sRGBEncoding; 
            container.appendChild(renderer.domElement);

            // Orbit Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.target.set(0, 0, 0);

            // Lighting setup
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);
            
            const backLight = new THREE.DirectionalLight(0xffffff, 0.3);
            backLight.position.set(-10, -20, -10);
            scene.add(backLight);

            // Handle Window Resize
            window.addEventListener('resize', onWindowResize, false);

            // Start animation loop
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // required if controls.enableDamping or controls.autoRotate are set
            renderer.render(scene, camera);
        }

        function setupEventListeners() {
            document.getElementById('fbx-upload').addEventListener('change', handleFBXUpload);
            document.getElementById('texture-upload').addEventListener('change', handleTextureUpload);
            document.getElementById('reset-cam-btn').addEventListener('click', () => {
                camera.position.set(15, 10, 15);
                controls.target.set(0, 0, 0);
                controls.update();
            });
        }

        function handleFBXUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            showNotification('Parsing FBX Model...', 'success');

            const reader = new FileReader();
            reader.onload = function (e) {
                const arrayBuffer = e.target.result;
                const loader = new THREE.FBXLoader();
                
                try {
                    // Parse FBX array buffer
                    const object = loader.parse(arrayBuffer, '');
                    
                    // Remove old model if it exists
                    if (currentModel) {
                        scene.remove(currentModel);
                    }

                    currentModel = object;
                    normalizeModel(currentModel);
                    scene.add(currentModel);

                    showNotification('FBX Loaded Successfully!', 'success');
                } catch (error) {
                    console.error(error);
                    showNotification('Error parsing FBX file. Check console.', 'error');
                }
                
                // Reset input so the same file can be uploaded again if needed
                event.target.value = ''; 
            };
            reader.readAsArrayBuffer(file);
        }

        function handleTextureUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (!currentModel) {
                showNotification('Please load an FBX model first.', 'error');
                event.target.value = '';
                return;
            }

            const reader = new FileReader();
            reader.onload = function (e) {
                const dataUrl = e.target.result;
                const textureLoader = new THREE.TextureLoader();
                
                textureLoader.load(dataUrl, (texture) => {
                    // Critical for Blockbench pixel art textures: 
                    // Use NearestFilter to prevent blurring
                    texture.magFilter = THREE.NearestFilter;
                    texture.minFilter = THREE.NearestFilter;
                    texture.encoding = THREE.sRGBEncoding;

                    // Apply texture to all meshes in the model
                    let appliedCount = 0;
                    currentModel.traverse((child) => {
                        if (child.isMesh) {
                            // Some meshes have multiple materials in an array
                            if (Array.isArray(child.material)) {
                                child.material.forEach(mat => {
                                    mat.map = texture;
                                    mat.needsUpdate = true;
                                });
                            } else {
                                child.material.map = texture;
                                child.material.needsUpdate = true;
                            }
                            appliedCount++;
                        }
                    });

                    if (appliedCount > 0) {
                        showNotification('Texture applied successfully!', 'success');
                    } else {
                        showNotification('Model has no meshes to apply texture to.', 'error');
                    }
                }, undefined, (err) => {
                    console.error("Texture Load Error", err);
                    showNotification('Error loading texture.', 'error');
                });
                
                // Reset input
                event.target.value = '';
            };
            reader.readAsDataURL(file);
        }

        // Centers and scales the model so it fits nicely in the view
        function normalizeModel(model) {
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());

            // Center the model's position
            model.position.x += (model.position.x - center.x);
            model.position.y += (model.position.y - center.y) + (size.y / 2); // Put bottom at y=0
            model.position.z += (model.position.z - center.z);

            // Scale to a maximum dimension of roughly 10 units
            const maxDim = Math.max(size.x, size.y, size.z);
            if (maxDim > 0) {
                const scale = 10 / maxDim;
                model.scale.set(scale, scale, scale);
            }
        }
    </script>
</body>
</html>
